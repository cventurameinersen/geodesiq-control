[project]
name = "geodesiq"
dynamic = ["version"]
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.4.4",
    "scipy>=1.17.1",
]

[project.optional-dependencies]
plot = ["matplotlib>=3.10.9"]
docs = ["sphinx>=8"]

[dependency-groups]
dev = [
    "ipykernel==6.29.5", # pinned to avoid problem with ipywidgets
    "ipympl>=0.10.0",
    "joblib>=1.5.2",
    "jupyterlab>=4.5.7",
    "jupyterlab-execute-time>=3.3.0",
    "qutip>=5.2.3",
    "theme-darcula>=4.0.0",
    "tqdm>=4.67.3",
    "scipy-stubs>=1.17.1.3",
    "pytest>=9.0.3",
    "scipy-stubs>=1.17.1.4",
    "parameterrun>=0.4.1"
]
bench = [
    "pytest-benchmark>=5",
]

[tool.uv]
package = true

[tool.setuptools.dynamic]
version = { attr = "geodesiq._meta.__version__" }
