name: Publish

on:
  workflow_run:
    workflows: [ "Release" ]
    types: [ completed ]
    branches: [ main ]

permissions: { }

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true

      - name: Sync build environment
        run: uv sync --only-group build

      - name: Verify the GitHub release exists for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import re

          content = pathlib.Path("src/geodesiq/_meta.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', content)
          if not match:
              raise SystemExit("Could not find package version")
          print(match.group(1))
          PY
          )

          TAG="v${VERSION}"
          git fetch --tags origin
          TAG_SHA=$(git rev-list -n 1 "$TAG")

          if [ "$TAG_SHA" != "$EXPECTED_SHA" ]; then
            echo "Tag $TAG points to $TAG_SHA, expected $EXPECTED_SHA."
            exit 1
          fi

          gh release view "$TAG" >/dev/null

      - name: Build distributions
        run: uv run python -m build

      - name: Check distributions
        run: uv run twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1