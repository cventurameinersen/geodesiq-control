name: Release

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]

permissions: { }

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Read version from package
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          meta_file = pathlib.Path("src/geodesiq/_meta.py")
          content = meta_file.read_text(encoding="utf-8")

          match = re.search(
              r'__version__\s*=\s*["\']([^"\']+)["\']',
              content,
          )

          if not match:
              raise SystemExit(
                  "Could not find __version__ in src/geodesiq/_meta.py"
              )

          version = match.group(1)

          with open(
              os.environ["GITHUB_OUTPUT"],
              "a",
              encoding="utf-8",
          ) as output:
              output.write(f"version={version}\n")
              output.write(f"tag=v{version}\n")
          PY

      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin

          if git ls-remote \
            --exit-code \
            --tags origin \
            "refs/tags/${TAG}" >/dev/null 2>&1
          then
            echo "Tag ${TAG} already exists."
            echo "Bump __version__ before merging to main."
            exit 1
          fi

      - name: Extract release notes from changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]

          changelog = pathlib.Path("CHANGELOG.md").read_text(
              encoding="utf-8"
          )

          pattern = re.compile(
              rf"^## \[{re.escape(version)}\][^\n]*\n"
              rf"(?P<body>.*?)(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )

          match = pattern.search(changelog)

          if not match:
              raise SystemExit(
                  f"Could not find CHANGELOG entry for version {version}"
              )

          notes = match.group("body").strip()

          pathlib.Path("release_notes.md").write_text(
              notes + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh release create "$TAG" \
            --target "$SHA" \
            --title "$TAG" \
            --notes-file release_notes.md